syntax = "proto3";

package benchmark;

message BenchmarkMessage {
  int32 id = 1;
  int64 timestamp = 2;
  float score = 3;
  double value = 4;
  string name = 5;
  bytes data = 6;
  bool active = 7;
  repeated int32 tags = 8;
  repeated string labels = 9;
  EmbeddedMessage embedded = 10;
}

message EmbeddedMessage {
  int32 sub_id = 1;
  string sub_name = 2;
  double sub_value = 3;
}

message SmallMessage {
  int32 id = 1;
  string name = 2;
}

message LargeMessage {
  int32 id = 1;
  string description = 2;
  bytes payload = 3;
  repeated BenchmarkMessage items = 4;
}
