name: Monitor and Generate Tests

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: 'Lookback hours for merged PRs'
        required: false
        default: '168'
      verbose:
        description: 'Enable verbose logging'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  monitor:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup venv and install dependencies
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install requests pyyaml

      - name: Run monitor pipeline
        env:
          GITCODE_ACCESS_TOKEN: ${{ secrets.GITCODE_ACCESS_TOKEN }}
          LOOKBACK_HOURS: ${{ github.event.inputs.lookback_hours || '168' }}
        run: |
          source .venv/bin/activate
          cd openeuler-image-monitor
          python3 -m src.main -c config.yaml

      - name: Check generated scaffolding
        run: |
          echo "=== Tests directory status ==="
          ls -la tests/ || true
          echo ""
          echo "=== Newly generated software (if any) ==="
          cd openeuler-image-monitor
          for dir in results/*/; do
            if [ -f "${dir}test_generation.txt" ]; then
              echo "--- ${dir} ---"
              head -20 "${dir}test_generation.txt"
            fi
          done || true

      - name: Configure git identity
        run: |
          HOME="${HOME:-/home/runner}"
          export HOME
          git config --global user.email "runner@github-actions"
          git config --global user.name "GitHub Actions Runner"
          git config --global --add safe.directory '*'

      - name: Commit generated test scaffolding
        run: |
          HOME="${HOME:-/home/runner}"
          export HOME
          cd tests
          git add -A || true
          if ! git diff --cached --quiet; then
            git commit -m "auto: generate test scaffolding [skip ci]"
            git push
          else
            echo "No new scaffolding to commit"
          fi

      - name: Commit monitor results
        run: |
          HOME="${HOME:-/home/runner}"
          export HOME
          cd openeuler-image-monitor
          git add results/ state.db || true
          if ! git diff --cached --quiet; then
            git commit -m "auto: monitor results update [skip ci]"
            git push
          else
            echo "No new results to commit"
          fi

      - name: Push test results to Gitcode as PR
        env:
          GITCODE_ACCESS_TOKEN: ${{ secrets.GITCODE_ACCESS_TOKEN }}
          GITCODE_SSH_KEY: ${{ secrets.GITCODE_SSH_KEY }}
        run: |
          HOME="${HOME:-/home/runner}"
          export HOME
          WORK_DIR="${GITHUB_WORKSPACE:-$(pwd)}"
          LATEST_GEN_DIR=$(ls -td openeuler-image-monitor/results/*/ 2>/dev/null | head -1)
          if [ -z "${LATEST_GEN_DIR}" ]; then
            echo "No results directory found, skipping Gitcode PR"
            exit 0
          fi
          GEN_FILE="${LATEST_GEN_DIR}test_generation.json"
          if [ ! -f "${GEN_FILE}" ]; then
            echo "No test_generation.json found, skipping Gitcode PR"
            exit 0
          fi
          GENERATED_LIST=$(python3 -c "
          import json
          with open('${GEN_FILE}') as f:
              data = json.load(f)
          for item in data:
              if item.get('status') == 'generated':
                  print(item['software'] + '|' + item['version'] + '|' + item.get('category','') + '|' + item.get('docker_tag',''))
          " 2>/dev/null)
          if [ -z "${GENERATED_LIST}" ]; then
            echo "No newly generated software found, skipping Gitcode PR"
            exit 0
          fi
          echo "Newly generated software to push to Gitcode:"
          echo "${GENERATED_LIST}"
          mkdir -p "${HOME}/.ssh"
          if [ -n "${GITCODE_SSH_KEY}" ]; then
            echo "Using SSH key for Gitcode authentication"
            printf '%s\n' "${GITCODE_SSH_KEY}" > "${HOME}/.ssh/gitcode_key"
            chmod 600 "${HOME}/.ssh/gitcode_key"
            cat > "${HOME}/.ssh/config" << 'SSHCONF'
          Host gitcode.com
            IdentityFile ~/.ssh/gitcode_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            IdentitiesOnly yes
          SSHCONF
            chmod 600 "${HOME}/.ssh/config"
            ssh-keyscan gitcode.com >> "${HOME}/.ssh/known_hosts" 2>/dev/null
            GIT_SSH_COMMAND="ssh -i ${HOME}/.ssh/gitcode_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
            export GIT_SSH_COMMAND
            GITCODE_REPO_URL="git@gitcode.com:Tian-Fantasea/openeuler-docker-images.git"
          else
            echo "No SSH key, trying HTTPS with various auth formats"
            GITCODE_REPO_URL="https://oauth2:${GITCODE_ACCESS_TOKEN}@gitcode.com/Tian-Fantasea/openeuler-docker-images.git"
          fi
          GITCODE_DIR="/tmp/gitcode-openeuler-docker-images"
          rm -rf "${GITCODE_DIR}"
          git clone --depth=1 "${GITCODE_REPO_URL}" "${GITCODE_DIR}" 2>&1 || {
            if [ -z "${GITCODE_SSH_KEY}" ]; then
              GITCODE_REPO_URL="https://bot:${GITCODE_ACCESS_TOKEN}@gitcode.com/Tian-Fantasea/openeuler-docker-images.git"
              git clone --depth=1 "${GITCODE_REPO_URL}" "${GITCODE_DIR}" 2>&1 || {
                GITCODE_REPO_URL="https://${GITCODE_ACCESS_TOKEN}@gitcode.com/Tian-Fantasea/openeuler-docker-images.git"
                git clone --depth=1 "${GITCODE_REPO_URL}" "${GITCODE_DIR}" 2>&1 || {
                  echo "ERROR: All git clone auth methods failed"
                  echo "Please add GITCODE_SSH_KEY secret to GitHub repo"
                  exit 1
                }
              }
            else
              echo "ERROR: SSH clone failed for Gitcode"
              exit 1
            fi
          }
          cd "${GITCODE_DIR}"
          git config user.email "opencode-bot@gitcode.com"
          git config user.name "opencode-bot"
          DEFAULT_BRANCH=$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')
          if [ -z "${DEFAULT_BRANCH}" ]; then
            DEFAULT_BRANCH="master"
          fi
          echo "Gitcode repo default branch: ${DEFAULT_BRANCH}"
          for line in ${GENERATED_LIST}; do
            SOFTWARE=$(echo "${line}" | cut -d'|' -f1)
            VERSION=$(echo "${line}" | cut -d'|' -f2)
            CATEGORY=$(echo "${line}" | cut -d'|' -f3)
            DOCKER_TAG=$(echo "${line}" | cut -d'|' -f4)
            BRANCH_NAME="auto-benchmark-${SOFTWARE}-${VERSION}"
            echo "=== Processing ${SOFTWARE} v${VERSION} ==="
            git checkout "${DEFAULT_BRANCH}" 2>&1
            git checkout -b "${BRANCH_NAME}" 2>&1 || git checkout "${BRANCH_NAME}" 2>&1
            mkdir -p "tests"
            rm -rf "tests/${SOFTWARE}"
            cp -r "${WORK_DIR}/tests/${SOFTWARE}" "tests/" 2>&1 || {
              echo "ERROR: Failed to copy tests/${SOFTWARE} directory"
              git checkout "${DEFAULT_BRANCH}"
              git branch -D "${BRANCH_NAME}" 2>/dev/null
              continue
            }
            git add -A
            if git diff --cached --quiet; then
              echo "No new changes for ${SOFTWARE}, skipping"
              git checkout "${DEFAULT_BRANCH}"
              git branch -D "${BRANCH_NAME}" 2>/dev/null
              continue
            fi
            git commit -m "【自动测试】${SOFTWARE}容器镜像性能基准测试 v${VERSION}" 2>&1
            if [ -n "${GITCODE_SSH_KEY}" ]; then
              GIT_SSH_COMMAND="ssh -i ${HOME}/.ssh/gitcode_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
              export GIT_SSH_COMMAND
              git remote set-url origin "git@gitcode.com:Tian-Fantasea/openeuler-docker-images.git" 2>&1
              git push --force-with-lease origin "${BRANCH_NAME}" 2>&1 || \
              git push --force origin "${BRANCH_NAME}" 2>&1 || {
                echo "ERROR: SSH push failed for Gitcode"
                git checkout "${DEFAULT_BRANCH}"
                continue
              }
            else
              PUSH_URL="https://bot:${GITCODE_ACCESS_TOKEN}@gitcode.com/Tian-Fantasea/openeuler-docker-images.git"
              git remote set-url origin "${PUSH_URL}" 2>&1
              git push origin "${BRANCH_NAME}" 2>&1 || {
                PUSH_URL2="https://oauth2:${GITCODE_ACCESS_TOKEN}@gitcode.com/Tian-Fantasea/openeuler-docker-images.git"
                git remote set-url origin "${PUSH_URL2}" 2>&1
                git push origin "${BRANCH_NAME}" 2>&1 || {
                  PUSH_URL3="https://${GITCODE_ACCESS_TOKEN}@gitcode.com/Tian-Fantasea/openeuler-docker-images.git"
                  git remote set-url origin "${PUSH_URL3}" 2>&1
                  git push origin "${BRANCH_NAME}" 2>&1 || {
                    echo "ERROR: All push auth methods failed for Gitcode"
                    git checkout "${DEFAULT_BRANCH}"
                    continue
                  }
                }
              }
            fi
            RESULT_FILE="${WORK_DIR}/tests/${SOFTWARE}/results/${VERSION}/results.txt"
            python3 "${WORK_DIR}/openeuler-image-monitor/src/create_gitcode_pr.py" \
              --token "${GITCODE_ACCESS_TOKEN}" \
              --software "${SOFTWARE}" \
              --version "${VERSION}" \
              --docker-tag "${DOCKER_TAG}" \
              --branch "${BRANCH_NAME}" \
              --result-file "${RESULT_FILE}" 2>&1
            git checkout "${DEFAULT_BRANCH}" 2>&1
          done
          cd "${WORK_DIR}"

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-results-${{ github.run_number }}
          path: |
            openeuler-image-monitor/results/
            openeuler-image-monitor/state.db
          retention-days: 30
